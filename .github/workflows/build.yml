name: 自动构建注入版 IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      # 第一步：安装工具
      - name: 安装工具
        run: |
          echo "=== 系统信息 ==="
          sw_vers
          xcrun --sdk iphoneos --show-sdk-version
          
          echo "=== 安装 ldid ==="
          brew install ldid
          
          echo "=== 下载 insert_dylib（预编译版） ==="
          # 直接下载预编译好的，不用自己编译
          curl -L -o /usr/local/bin/insert_dylib "https://github.com/Tyilo/insert_dylib/releases/download/1.0.0/insert_dylib" 2>/dev/null || (
            # 如果上面不行，就用另一个源
            echo "下载失败，尝试从其他源下载"
            curl -L -o /usr/local/bin/insert_dylib "https://raw.githubusercontent.com/Tyilo/insert_dylib/master/insert_dylib" 2>/dev/null || true
          )
          chmod +x /usr/local/bin/insert_dylib 2>/dev/null || true
          
          # 验证
          if command -v insert_dylib &> /dev/null; then
            echo "✅ insert_dylib 可用"
          else
            echo "⚠️ insert_dylib 下载失败，尝试用 optool"
            curl -L -o /usr/local/bin/optool "https://github.com/alexzielenski/optool/releases/download/1.0.0/optool" 2>/dev/null || true
            chmod +x /usr/local/bin/optool 2>/dev/null || true
          fi
          
          echo "=== 工具检查 ==="
          which ldid
          which insert_dylib || which optool || echo "⚠️ 注入工具都没找到"
          echo "✅ 工具安装完成"

      # 第二步：编译 dylib
      - name: 编译 dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CLANG=$(xcrun --sdk iphoneos -f clang)
          
          echo "SDK: $SDK"
          echo "编译器: $CLANG"
          
          $CLANG -arch arm64 -isysroot $SDK -dynamiclib \
              -o IBOXBypass.dylib \
              Tweak.m fishhook.c \
              -fobjc-arc \
              -framework Foundation \
              -framework UIKit \
              -miphoneos-version-min=15.0
          
          ldid -S IBOXBypass.dylib
          ls -lh IBOXBypass.dylib
          file IBOXBypass.dylib
          echo "✅ dylib 编译完成"

      # 第三步：注入 dylib
      - name: 注入 dylib
        run: |
          if [ ! -f "original.ipa" ]; then
            echo "❌ 错误：仓库根目录找不到 original.ipa！"
            exit 1
          fi
          
          unzip -q original.ipa -d temp
          echo "✅ IPA 解压完成"
          
          APP_NAME=$(ls temp/Payload/ | grep "\.app$" | head -1)
          echo "✅ APP: $APP_NAME"
          
          BIN_PATH="temp/Payload/$APP_NAME"
          BIN_NAME=""
          for f in "$BIN_PATH"/*; do
            if file "$f" | grep -q "Mach-O" && [ ! -d "$f" ]; then
              BIN_NAME=$(basename "$f")
              break
            fi
          done
          echo "✅ 主二进制: $BIN_NAME"
          
          cp IBOXBypass.dylib "$BIN_PATH/"
          echo "✅ dylib 复制完成"
          
          # 注入加载命令
          if command -v insert_dylib &> /dev/null; then
            echo "使用 insert_dylib 注入"
            insert_dylib --inplace "@executable_path/IBOXBypass.dylib" "$BIN_PATH/$BIN_NAME"
          elif command -v optool &> /dev/null; then
            echo "使用 optool 注入"
            optool install -c load -p "@executable_path/IBOXBypass.dylib" -t "$BIN_PATH/$BIN_NAME"
          else
            echo "❌ 没有可用的注入工具！"
            exit 1
          fi
          echo "✅ 加载命令注入完成"
          
          echo "=== 验证注入结果 ==="
          otool -L "$BIN_PATH/$BIN_NAME" | head -20
          
          ldid -S "$BIN_PATH/$BIN_NAME"
          ldid -S "$BIN_PATH/IBOXBypass.dylib"
          echo "✅ 重新签名完成"
          
          cd temp && zip -qr ../IBOX_已绕过验证.ipa Payload && cd ..
          ls -lh IBOX_已绕过验证.ipa
          echo "✅ 最终 IPA 打包完成"

      - name: 上传最终 IPA
        uses: actions/upload-artifact@v4
        with:
          name: IBOX_已绕过验证.ipa
          path: IBOX_已绕过验证.ipa

      - name: 上传 dylib
        uses: actions/upload-artifact@v4
        with:
          name: IBOXBypass.dylib
          path: IBOXBypass.dylib
