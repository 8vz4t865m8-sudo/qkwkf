name: 自动构建注入版 IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      # 第一步：安装工具
      - name: 安装工具
        run: |
          echo "=== 系统信息 ==="
          sw_vers
          xcrun --sdk iphoneos --show-sdk-version
          
          echo "=== 安装 ldid ==="
          brew install ldid
          
          echo "=== 工具检查 ==="
          which ldid
          which python3
          echo "✅ 工具安装完成"

      # 第二步：编译 dylib
      - name: 编译 dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CLANG=$(xcrun --sdk iphoneos -f clang)
          
          echo "SDK: $SDK"
          echo "编译器: $CLANG"
          
          $CLANG -arch arm64 -isysroot $SDK -dynamiclib \
              -o IBOXBypass.dylib \
              Tweak.m fishhook.c \
              -fobjc-arc \
              -framework Foundation \
              -framework UIKit \
              -miphoneos-version-min=15.0
          
          ldid -S IBOXBypass.dylib
          ls -lh IBOXBypass.dylib
          file IBOXBypass.dylib
          echo "✅ dylib 编译完成"

      # 第三步：注入 dylib（纯 Python 手动写 Mach-O）
      - name: 注入 dylib
        run: |
          if [ ! -f "original.ipa" ]; then
            echo "❌ 错误：仓库根目录找不到 original.ipa！"
            exit 1
          fi
          
          unzip -q original.ipa -d temp
          echo "✅ IPA 解压完成"
          
          APP_NAME=$(ls temp/Payload/ | grep "\.app$" | head -1)
          echo "✅ APP: $APP_NAME"
          
          BIN_PATH="temp/Payload/$APP_NAME"
          BIN_NAME=""
          for f in "$BIN_PATH"/*; do
            if file "$f" | grep -q "Mach-O" && [ ! -d "$f" ]; then
              BIN_NAME=$(basename "$f")
              break
            fi
          done
          echo "✅ 主二进制: $BIN_NAME"
          
          cp IBOXBypass.dylib "$BIN_PATH/"
          echo "✅ dylib 复制完成"
          
          # 纯 Python 手动注入 LC_LOAD_DYLIB
          python3 << 'EOF'
          import os
          import struct
          
          # 找主二进制
          app_dir = "temp/Payload"
          app_name = [d for d in os.listdir(app_dir) if d.endswith(".app")][0]
          bin_path = os.path.join(app_dir, app_name)
          
          bin_name = None
          for f in os.listdir(bin_path):
              full = os.path.join(bin_path, f)
              if os.path.isfile(full):
                  with open(full, 'rb') as fh:
                      magic = fh.read(4)
                      if magic == b'\xcf\xfa\xed\xfe':  # ARM64 little endian
                          bin_name = f
                          break
          
          full_path = os.path.join(bin_path, bin_name)
          print(f"处理: {full_path}")
          
          # 读取文件
          with open(full_path, 'rb') as f:
              data = bytearray(f.read())
          
          # 解析 Mach-O 头 (32 bytes for 64-bit)
          magic, cputype, cpusubtype, filetype, ncmds, sizeofcmds, flags, reserved = struct.unpack_from('<IIIIIIII', data, 0)
          
          print(f"Magic: {hex(magic)}")
          print(f"CPU: {cputype}")
          print(f"加载命令数量: {ncmds}")
          print(f"加载命令总大小: {sizeofcmds}")
          
          # 要添加的 dylib 路径
          dylib_path = "@executable_path/IBOXBypass.dylib"
          path_bytes = dylib_path.encode('utf-8') + b'\x00'
          
          # LC_LOAD_DYLIB 命令结构
          # cmd (4) + cmdsize (4) + offset (4) + timestamp (4) + current_version (4) + compatibility_version (4) + path
          path_offset = 24  # 从命令开始到路径字符串的偏移
          cmdsize = path_offset + len(path_bytes)
          # 对齐到 8 字节
          if cmdsize % 8 != 0:
              cmdsize += 8 - (cmdsize % 8)
              path_bytes = path_bytes + b'\x00' * (cmdsize - path_offset - len(path_bytes))
          
          # 构造加载命令
          LC_LOAD_DYLIB = 0xC
          cmd_data = struct.pack('<IIIIII', 
              LC_LOAD_DYLIB,  # cmd
              cmdsize,        # cmdsize
              path_offset,    # offset (到路径的偏移)
              0,              # timestamp
              0x00010000,     # current_version (1.0.0)
              0x00010000      # compatibility_version (1.0.0)
          ) + path_bytes
          
          print(f"新命令大小: {cmdsize}")
          
          # 找到加载命令的结束位置（在第 28 字节之后 sizeofcmds 字节）
          cmds_start = 32  # 64-bit header is 32 bytes
          cmds_end = cmds_start + sizeofcmds
          
          # 在加载命令末尾插入新命令
          new_data = data[:cmds_end] + cmd_data + data[cmds_end:]
          
          # 更新头里的 ncmds 和 sizeofcmds
          struct.pack_into('<I', new_data, 16, ncmds + 1)      # ncmds
          struct.pack_into('<I', new_data, 20, sizeofcmds + cmdsize)  # sizeofcmds
          
          # 写回文件
          with open(full_path, 'wb') as f:
              f.write(new_data)
          
          print("✅ 加载命令注入完成")
          EOF
          
          echo "=== 验证注入结果 ==="
          otool -L "$BIN_PATH/$BIN_NAME" | head -20
          
          ldid -S "$BIN_PATH/$BIN_NAME"
          ldid -S "$BIN_PATH/IBOXBypass.dylib"
          echo "✅ 重新签名完成"
          
          cd temp && zip -qr ../IBOX_已绕过验证.ipa Payload && cd ..
          ls -lh IBOX_已绕过验证.ipa
          echo "✅ 最终 IPA 打包完成"

      - name: 上传最终 IPA
        uses: actions/upload-artifact@v4
        with:
          name: IBOX_已绕过验证.ipa
          path: IBOX_已绕过验证.ipa

      - name: 上传 dylib
        uses: actions/upload-artifact@v4
        with:
          name: IBOXBypass.dylib
          path: IBOXBypass.dylib
