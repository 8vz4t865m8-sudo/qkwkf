name: 自动生成无验证IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 解压原始IPA
        run: |
          unzip -q original.ipa -d Unpacked
          APP_PATH=$(echo Unpacked/Payload/*.app)
          echo "APP路径: $APP_PATH"

      - name: 编译绕过代码
        run: |
          clang -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -framework UIKit -framework Foundation \
            -miphoneos-version-min=12.0 -fobjc-arc \
            -dynamiclib Bypass.m -o Bypass.dylib

      - name: 只修改Info.plist，完全不碰原可执行文件
        run: |
          APP_PATH=$(echo Unpacked/Payload/*.app)
          cp Bypass.dylib $APP_PATH/
          
          # 只改Info.plist，替换启动入口
          /usr/libexec/PlistBuddy -c "Set :NSPrincipalClass BypassEntry" $APP_PATH/Info.plist
          
          # 签名
          brew install ldid
          ldid -S $APP_PATH/Bypass.dylib

      - name: 重新打包IPA
        run: |
          cd Unpacked
          zip -qr ../IBOX-无验证版.ipa .

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: IBOX-无验证版
          path: IBOX-无验证版.ipa
