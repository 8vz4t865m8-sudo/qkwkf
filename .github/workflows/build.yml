name: 自动生成无验证IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 解压原始IPA
        run: |
          unzip -q original.ipa -d Unpacked
          echo "✅ 找到APP:"
          ls -la Unpacked/Payload/

      - name: 编译绕过dylib
        run: |
          clang -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -framework UIKit \
            -framework Foundation \
            -miphoneos-version-min=12.0 \
            -fobjc-arc \
            -dynamiclib \
            Bypass.m \
            -o T3Bypass.dylib
          echo "✅ Dylib编译完成: $(ls -lh T3Bypass.dylib)"

      - name: 注入dylib
        run: |
          cp T3Bypass.dylib Unpacked/Payload/MyRadar.app/
          
          # 编译insert_dylib（和案例一模一样）
          git clone https://github.com/tyilo/insert_dylib
          cd insert_dylib
          xcodebuild -target insert_dylib -configuration Release
          sudo cp build/Release/insert_dylib /usr/local/bin/
          cd ..
          
          insert_dylib --strip-codesig --inplace \
            "@executable_path/T3Bypass.dylib" \
            Unpacked/Payload/MyRadar.app/MyRadar

      - name: 签名
        run: |
          brew install ldid
          ldid -S Unpacked/Payload/MyRadar.app/MyRadar
          ldid -S Unpacked/Payload/MyRadar.app/T3Bypass.dylib

      - name: 重新打包IPA
        run: |
          cd Unpacked
          zip -qr ../IBOX-无验证版.ipa .
          echo "✅ IPA打包完成: $(ls -lh ../IBOX-无验证版.ipa)"

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: IBOX-无验证版
          path: IBOX-无验证版.ipa
