name: 自动构建注入版 IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      # 第一步：安装 Theos
      - name: 安装 Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV
          echo "✅ Theos 安装完成"

      # 第二步：安装 optool 和 ldid
      - name: 安装注入工具
        run: |
          # 安装 optool
          git clone https://github.com/alexzielenski/optool.git
          cd optool && make && sudo cp optool /usr/local/bin/ && cd ..
          
          # 安装 ldid
          git clone https://github.com/ProcursusTeam/ldid.git
          cd ldid && make && sudo cp ldid /usr/local/bin/ && cd ..
          
          echo "✅ 工具安装完成"
          which optool
          which ldid

      # 第三步：编译 dylib
      - name: 编译 dylib
        run: |
          make clean
          make package FINALPACKAGE=1
          ls -lh .theos/obj/debug/
          echo "✅ dylib 编译完成"

      # 第四步：注入到 IPA
      - name: 注入 dylib
        run: |
          # 检查原始 IPA 是否存在
          if [ ! -f "original.ipa" ]; then
            echo "❌ 错误：仓库根目录找不到 original.ipa 文件！"
            exit 1
          fi
          
          # 解压
          unzip -q original.ipa -d temp
          echo "✅ IPA 解压完成"
          
          # 找 APP 名字（自动识别，不用硬编码）
          APP_NAME=$(ls temp/Payload/ | grep ".app" | head -1)
          echo "✅ 找到 APP: $APP_NAME"
          
          # 找主二进制名字（自动识别）
          BIN_NAME=$(ls "temp/Payload/$APP_NAME/" | grep -v ".dylib" | grep -v ".nib" | grep -v ".plist" | grep -v ".png" | grep -v ".lproj" | grep -v "_CodeSignature" | head -1)
          echo "✅ 主二进制: $BIN_NAME"
          
          # 复制 dylib
          cp .theos/obj/debug/IBOXBypass.dylib "temp/Payload/$APP_NAME/"
          echo "✅ dylib 复制完成"
          
          # 注入加载命令
          optool install -c load -p "@executable_path/IBOXBypass.dylib" -t "temp/Payload/$APP_NAME/$BIN_NAME"
          echo "✅ 加载命令注入完成"
          
          # 重新签名
          ldid -S "temp/Payload/$APP_NAME/$BIN_NAME"
          ldid -S "temp/Payload/$APP_NAME/IBOXBypass.dylib"
          echo "✅ 重新签名完成"
          
          # 重新打包
          cd temp && zip -qr ../IBOX_已绕过验证.ipa Payload && cd ..
          ls -lh IBOX_已绕过验证.ipa
          echo "✅ 最终 IPA 打包完成"

      # 第五步：上传产物
      - name: 上传最终 IPA
        uses: actions/upload-artifact@v3
        with:
          name: IBOX_已绕过验证.ipa
          path: IBOX_已绕过验证.ipa

      - name: 上传 dylib
        uses: actions/upload-artifact@v3
        with:
          name: IBOXBypass.dylib
          path: .theos/obj/debug/IBOXBypass.dylib
