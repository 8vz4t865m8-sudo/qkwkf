name: 自动生成无验证IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装所有依赖工具
        run: |
          brew install ldid make dpkg insert-dylib
          git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: 编译绕过补丁
        run: |
          make package FINALPACKAGE=1
          dpkg -x packages/*.deb deb_extract
          ls -la deb_extract/Library/MobileSubstrate/DynamicLibraries/

      - name: 解压原始IPA
        run: |
          unzip -q original.ipa -d ipa_temp
          echo "✅ 找到APP:"
          ls -la ipa_temp/Payload/

      - name: 注入dylib到应用
        run: |
          APP_NAME=$(ls ipa_temp/Payload/ | grep ".app" | head -1)
          EXEC_NAME=${APP_NAME%.app}
          echo "✅ APP: $APP_NAME"
          echo "✅ 可执行文件: $EXEC_NAME"
          
          cp deb_extract/Library/MobileSubstrate/DynamicLibraries/*.dylib ipa_temp/Payload/$APP_NAME/
          
          # 用brew安装的insert_dylib，绝对不会找不到
          insert-dylib @executable_path/T3Bypass_IBOX.dylib \
            ipa_temp/Payload/$APP_NAME/$EXEC_NAME \
            --all-yes --strip-codesig
          
          ldid -S ipa_temp/Payload/$APP_NAME/$EXEC_NAME
          ldid -S ipa_temp/Payload/$APP_NAME/T3Bypass_IBOX.dylib

      - name: 重新打包成IPA
        run: |
          cd ipa_temp
          zip -qry ../IBOX-无验证版.ipa .
          cd ..
          ls -lh IBOX-无验证版.ipa

      - name: 上传成品IPA
        uses: actions/upload-artifact@v4
        with:
          name: IBOX-无验证版
          path: IBOX-无验证版.ipa
