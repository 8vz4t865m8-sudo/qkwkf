name: 自动生成无验证IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装依赖工具
        run: |
          brew install ldid make dpkg
          git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: 编译绕过补丁
        run: |
          make package FINALPACKAGE=1
          # 解压deb包提取dylib
          dpkg -x packages/*.deb deb_extract
          ls -la deb_extract/Library/MobileSubstrate/DynamicLibraries/

      - name: 解压原始IPA
        run: |
          unzip -q original.ipa -d ipa_temp
          # 列出Payload内容确认目录名
          ls -la ipa_temp/Payload/

      - name: 注入dylib到应用
        run: |
          # 复制dylib到APP目录
          cp deb_extract/Library/MobileSubstrate/DynamicLibraries/*.dylib ipa_temp/Payload/MyRadar.app/
          
          # 注入加载指令
          $THEOS/bin/insert_dylib @executable_path/T3Bypass_IBOX.dylib \
            ipa_temp/Payload/MyRadar.app/MyRadar \
            --all-yes --strip-codesig
          
          # 伪签名
          ldid -S ipa_temp/Payload/MyRadar.app/MyRadar
          ldid -S ipa_temp/Payload/MyRadar.app/T3Bypass_IBOX.dylib

      - name: 重新打包成IPA
        run: |
          cd ipa_temp
          zip -qry ../IBOX-无验证版.ipa .
          cd ..
          ls -lh IBOX-无验证版.ipa

      - name: 上传成品IPA
        uses: actions/upload-artifact@v4
        with:
          name: IBOX-无验证版
          path: IBOX-无验证版.ipa
