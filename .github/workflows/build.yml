name: 自动生成无验证IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装工具
        run: brew install ldid

      - name: 编译绕过dylib
        run: |
          clang -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -framework Foundation -framework UIKit \
            -miphoneos-version-min=12.0 -fobjc-arc \
            -dynamiclib Bypass.m -o Bypass.dylib
          ldid -S Bypass.dylib

      - name: 注入dylib
        run: |
          unzip -q original.ipa -d Unpacked
          APP_PATH=$(echo Unpacked/Payload/*.app)
          EXEC_NAME=$(basename $APP_PATH .app)
          
          cp Bypass.dylib $APP_PATH/
          
          # 编译insert_dylib
          git clone https://github.com/tyilo/insert_dylib
          cd insert_dylib
          xcodebuild -target insert_dylib -configuration Release
          sudo cp build/Release/insert_dylib /usr/local/bin/
          cd ..
          
          insert_dylib --strip-codesig --inplace \
            "@executable_path/Bypass.dylib" \
            $APP_PATH/$EXEC_NAME
          
          ldid -S $APP_PATH/$EXEC_NAME

      - name: 打包IPA
        run: |
          cd Unpacked
          zip -qr ../IBOX-无验证版.ipa .

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: IBOX-无验证版
          path: IBOX-无验证版.ipa
