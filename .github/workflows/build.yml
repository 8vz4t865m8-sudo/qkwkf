name: 自动构建注入版 IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      # 第一步：安装 Theos
      - name: 安装 Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV
          echo "✅ Theos 安装完成"

      # 第二步：安装工具
      - name: 安装注入工具
        run: |
          # 安装 ldid（用 brew）
          brew install ldid
          
          # 直接下载预编译好的 optool（不用自己编译）
          curl -L -o /usr/local/bin/optool "https://github.com/alexzielenski/optool/releases/download/1.0.0/optool" 2>/dev/null || (
            # 如果上面的链接不行，就用 insert_dylib 替代
            echo "optool 下载失败，使用 insert_dylib 替代"
            git clone https://github.com/Tyilo/insert_dylib.git
            cd insert_dylib && make && sudo cp insert_dylib /usr/local/bin/ && cd ..
          )
          chmod +x /usr/local/bin/optool 2>/dev/null || true
          
          echo "✅ 工具安装完成"
          which ldid
          which optool || which insert_dylib

      # 第三步：编译 dylib
      - name: 编译 dylib
        run: |
          make clean
          make package FINALPACKAGE=1
          ls -lh .theos/obj/debug/
          echo "✅ dylib 编译完成"

      # 第四步：注入到 IPA
      - name: 注入 dylib
        run: |
          # 检查原始 IPA
          if [ ! -f "original.ipa" ]; then
            echo "❌ 错误：仓库根目录找不到 original.ipa 文件！"
            exit 1
          fi
          
          # 解压
          unzip -q original.ipa -d temp
          echo "✅ IPA 解压完成"
          
          # 找 APP 名字
          APP_NAME=$(ls temp/Payload/ | grep ".app" | head -1)
          echo "✅ 找到 APP: $APP_NAME"
          
          # 找主二进制
          BIN_NAME=$(ls "temp/Payload/$APP_NAME/" | grep -v ".dylib" | grep -v ".nib" | grep -v ".plist" | grep -v ".png" | grep -v ".lproj" | grep -v "_CodeSignature" | grep -v "Assets" | head -1)
          echo "✅ 主二进制: $BIN_NAME"
          
          # 复制 dylib
          cp .theos/obj/debug/IBOXBypass.dylib "temp/Payload/$APP_NAME/"
          echo "✅ dylib 复制完成"
          
          # 注入加载命令（优先 optool，失败用 insert_dylib）
          if command -v optool &> /dev/null; then
            optool install -c load -p "@executable_path/IBOXBypass.dylib" -t "temp/Payload/$APP_NAME/$BIN_NAME"
            echo "✅ optool 注入完成"
          elif command -v insert_dylib &> /dev/null; then
            insert_dylib --inplace "@executable_path/IBOXBypass.dylib" "temp/Payload/$APP_NAME/$BIN_NAME"
            echo "✅ insert_dylib 注入完成"
          else
            echo "❌ 没有可用的注入工具！"
            exit 1
          fi
          
          # 重新签名
          ldid -S "temp/Payload/$APP_NAME/$BIN_NAME"
          ldid -S "temp/Payload/$APP_NAME/IBOXBypass.dylib"
          echo "✅ 重新签名完成"
          
          # 重新打包
          cd temp && zip -qr ../IBOX_已绕过验证.ipa Payload && cd ..
          ls -lh IBOX_已绕过验证.ipa
          echo "✅ 最终 IPA 打包完成"

      # 第五步：上传产物
      - name: 上传最终 IPA
        uses: actions/upload-artifact@v4
        with:
          name: IBOX_已绕过验证.ipa
          path: IBOX_已绕过验证.ipa

      - name: 上传 dylib
        uses: actions/upload-artifact@v4
        with:
          name: IBOXBypass.dylib
          path: .theos/obj/debug/IBOXBypass.dylib
