name: 自动构建注入版 IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      # 第一步：安装工具
      - name: 安装工具
        run: |
          echo "=== 系统信息 ==="
          sw_vers
          xcodebuild -version 2>/dev/null || true
          xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true
          
          echo "=== 安装 ldid ==="
          brew install ldid
          
          echo "=== 安装 insert_dylib（更稳定） ==="
          git clone https://github.com/Tyilo/insert_dylib.git
          cd insert_dylib && make && sudo cp insert_dylib /usr/local/bin/ && cd ..
          
          echo "=== 工具检查 ==="
          which ldid
          which insert_dylib
          xcrun --sdk iphoneos -f clang
          echo "✅ 工具安装完成"

      # 第二步：编译 dylib
      - name: 编译 dylib
        run: |
          make clean
          make
          file IBOXBypass.dylib
          echo "✅ dylib 编译完成"

      # 第三步：注入到 IPA
      - name: 注入 dylib
        run: |
          # 检查 IPA
          if [ ! -f "original.ipa" ]; then
            echo "❌ 错误：仓库根目录找不到 original.ipa！"
            exit 1
          fi
          
          # 解压
          unzip -q original.ipa -d temp
          echo "✅ IPA 解压完成"
          
          # 找 APP
          APP_NAME=$(ls temp/Payload/ | grep "\.app$" | head -1)
          echo "✅ APP: $APP_NAME"
          
          # 找主二进制（Mach-O 文件）
          BIN_PATH="temp/Payload/$APP_NAME"
          BIN_NAME=""
          for f in "$BIN_PATH"/*; do
            if file "$f" | grep -q "Mach-O" && [ ! -d "$f" ]; then
              BIN_NAME=$(basename "$f")
              break
            fi
          done
          echo "✅ 主二进制: $BIN_NAME"
          
          # 复制 dylib
          cp IBOXBypass.dylib "$BIN_PATH/"
          echo "✅ dylib 复制完成"
          
          # 注入加载命令
          insert_dylib --inplace "@executable_path/IBOXBypass.dylib" "$BIN_PATH/$BIN_NAME"
          echo "✅ 加载命令注入完成"
          
          # 验证注入是否成功
          otool -L "$BIN_PATH/$BIN_NAME" | grep -i bypass
          
          # 重新签名
          ldid -S "$BIN_PATH/$BIN_NAME"
          ldid -S "$BIN_PATH/IBOXBypass.dylib"
          echo "✅ 重新签名完成"
          
          # 重新打包
          cd temp && zip -qr ../IBOX_已绕过验证.ipa Payload && cd ..
          ls -lh IBOX_已绕过验证.ipa
          echo "✅ 最终 IPA 打包完成"

      # 第四步：上传
      - name: 上传最终 IPA
        uses: actions/upload-artifact@v4
        with:
          name: IBOX_已绕过验证.ipa
          path: IBOX_已绕过验证.ipa

      - name: 上传 dylib
        uses: actions/upload-artifact@v4
        with:
          name: IBOXBypass.dylib
          path: IBOXBypass.dylib
