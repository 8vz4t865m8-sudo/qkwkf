name: 自动生成无验证IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装依赖工具
        run: |
          brew install ldid make
          git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: 编译绕过补丁dylib
        run: |
          make package FINALPACKAGE=1
          ls -la packages/

      - name: 解压原始IPA
        run: |
          unzip -q original.ipa -d ipa_temp
          ls -la ipa_temp/Payload/

      - name: 注入dylib到应用
        run: |
          cp packages/*.dylib ipa_temp/Payload/MyRadar.app/
          
          $THEOS/bin/insert_dylib @executable_path/T3Bypass_IBOX.dylib \
            ipa_temp/Payload/MyRadar.app/MyRadar \
            --all-yes --strip-codesig
          
          ldid -S ipa_temp/Payload/MyRadar.app/MyRadar
          ldid -S ipa_temp/Payload/MyRadar.app/T3Bypass_IBOX.dylib

      - name: 重新打包成IPA
        run: |
          cd ipa_temp
          zip -qry ../IBOX-无验证版.ipa .
          cd ..
          ls -lh IBOX-无验证版.ipa

      - name: 上传成品IPA
        uses: actions/upload-artifact@v4
        with:
          name: IBOX-无验证版
          path: IBOX-无验证版.ipa
