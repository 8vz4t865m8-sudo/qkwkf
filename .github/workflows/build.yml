name: 自动生成无验证IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 先安装工具
        run: brew install ldid

      - name: 解压原始IPA
        run: |
          unzip -q original.ipa -d Unpacked
          APP_PATH=$(echo Unpacked/Payload/*.app)
          echo "APP路径: $APP_PATH"

      - name: Patch二进制绕过验证
        run: |
          APP_PATH=$(echo Unpacked/Payload/*.app)
          EXEC_NAME=$(basename $APP_PATH .app)
          
          # 导出原签名
          ldid -e $APP_PATH/$EXEC_NAME > ents.plist
          
          # 直接patch验证逻辑：把所有验证失败的0改成1
          perl -i -pe 's/\x00\x00\x00\x00(\x8B\x45\xFC\x85\xC0\x74)/\x00\x00\x00\x01$1/g' $APP_PATH/$EXEC_NAME
          
          # 恢复签名
          ldid -Sents.plist $APP_PATH/$EXEC_NAME

      - name: 重新打包IPA
        run: |
          cd Unpacked
          zip -qr ../IBOX-无验证版.ipa .

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: IBOX-无验证版
          path: IBOX-无验证版.ipa
