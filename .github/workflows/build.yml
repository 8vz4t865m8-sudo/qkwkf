name: 自动构建绕过版 IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      # 第一步：安装工具
      - name: 安装工具
        run: |
          brew install ldid
          echo "✅ 工具安装完成"

      # 第二步：Patch 主二进制
      - name: Patch 主二进制
        run: |
          if [ ! -f "original.ipa" ]; then
            echo "❌ 找不到 original.ipa"
            exit 1
          fi
          
          unzip -q original.ipa -d temp
          echo "✅ IPA 解压完成"
          
          APP_NAME=$(ls temp/Payload/ | grep "\.app$" | head -1)
          BIN_PATH="temp/Payload/$APP_NAME"
          
          # 找主二进制
          BIN_NAME=""
          for f in "$BIN_PATH"/*; do
            if file "$f" | grep -q "Mach-O" && [ ! -d "$f" ]; then
              BIN_NAME=$(basename "$f")
              break
            fi
          done
          echo "✅ 主二进制: $BIN_NAME"
          FULL_BIN="$BIN_PATH/$BIN_NAME"
          
          # ============================================
          # 第一部分：废掉所有崩溃调用（跟之前一样）
          # ============================================
          echo ""
          echo "=== 第一步：废掉所有崩溃调用 ==="
          python3 << 'PYEOF1'
          import os
          import struct
          
          app_dir = "temp/Payload"
          app_name = [d for d in os.listdir(app_dir) if d.endswith(".app")][0]
          bin_path = os.path.join(app_dir, app_name)
          
          bin_name = None
          for f in os.listdir(bin_path):
              full = os.path.join(bin_path, f)
              if os.path.isfile(full):
                  with open(full, 'rb') as fh:
                      magic = fh.read(4)
                      if magic == b'\xcf\xfa\xed\xfe':
                          bin_name = f
                          break
          
          full_path = os.path.join(bin_path, bin_name)
          
          with open(full_path, 'rb') as f:
              data = bytearray(f.read())
          
          # 解析 Mach-O 头
          magic, cputype, cpusubtype, filetype, ncmds, sizeofcmds, flags, reserved = struct.unpack_from('<IIIIIIII', data, 0)
          
          # 找 __TEXT 段和符号表
          text_vmaddr = 0
          text_fileoff = 0
          text_size = 0
          symtab_off = 0
          symtab_nsyms = 0
          symtab_stroff = 0
          symtab_strsize = 0
          
          offset = 32
          for i in range(ncmds):
              cmd, cmdsize = struct.unpack_from('<II', data, offset)
              
              if cmd == 0x19:  # LC_SEGMENT_64
                  segname, vmaddr, vmsize, fileoff, filesize, maxprot, initprot, nsects, flags = struct.unpack_from('<16sQQQQIIII', data, offset + 8)
                  segname = segname.decode('utf-8', errors='replace').rstrip('\x00')
                  if segname == '__TEXT':
                      text_vmaddr = vmaddr
                      text_fileoff = fileoff
                      text_size = filesize
              
              elif cmd == 0x2:  # LC_SYMTAB
                  symoff, nsyms, stroff, strsize = struct.unpack_from('<IIII', data, offset + 8)
                  symtab_off = symoff
                  symtab_nsyms = nsyms
                  symtab_stroff = stroff
                  symtab_strsize = strsize
              
              offset += cmdsize
          
          # 找崩溃函数符号
          crash_funcs = {}
          target_names = ['_exit', '_abort', '_kill', '_raise', '__assert_rtn', '_objc_exception_throw', '__pthread_exit']
          
          for i in range(symtab_nsyms):
              sym_off = symtab_off + i * 16
              n_strx, n_type, n_sect, n_desc, n_value = struct.unpack_from('<IBBHQ', data, sym_off)
              
              if n_strx > 0 and n_strx < symtab_strsize:
                  name_end = data.find(b'\x00', symtab_stroff + n_strx)
                  if name_end > 0:
                      name = data[symtab_stroff + n_strx:name_end].decode('utf-8', errors='replace')
                      if name in target_names:
                          crash_funcs[name] = n_value
          
          print(f"找到 {len(crash_funcs)} 个崩溃函数")
          
          # NOP 所有崩溃调用
          text_start_file = text_fileoff
          text_end_file = text_fileoff + text_size
          text_start_vm = text_vmaddr
          nop_count = 0
          
          pos = text_start_file
          while pos < text_end_file - 4:
              instr = struct.unpack_from('<I', data, pos)[0]
              
              if (instr >> 26) == 0x25:  # bl 指令
                  imm26 = instr & 0x03FFFFFF
                  if imm26 & 0x02000000:
                      imm26 -= 0x04000000
                  
                  target_vm = text_start_vm + (pos - text_start_file) + (imm26 << 2)
                  target_vm &= 0xFFFFFFFF
                  
                  for name, addr in crash_funcs.items():
                      if target_vm == addr:
                          struct.pack_into('<I', data, pos, 0xD503201F)  # NOP
                          nop_count += 1
                          break
              
              pos += 4
          
          print(f"NOP 了 {nop_count} 处崩溃调用")
          
          with open(full_path, 'wb') as f:
              f.write(data)
          
          print("✅ 崩溃调用处理完成")
          PYEOF1
          
          # ============================================
          # 第二部分：Patch 验证逻辑
          # ============================================
          echo ""
          echo "=== 第二步：Patch 验证逻辑 ==="
          
          # 用 otool 导出所有 ObjC 方法
          otool -ov "$FULL_BIN" > /tmp/objc_methods.txt
          echo "✅ 已导出 ObjC 方法列表"
          
          # 解析方法列表，找到 ViewController 的方法
          python3 << 'PYEOF2'
          import os
          import re
          import struct
          
          app_dir = "temp/Payload"
          app_name = [d for d in os.listdir(app_dir) if d.endswith(".app")][0]
          bin_path = os.path.join(app_dir, app_name)
          
          bin_name = None
          for f in os.listdir(bin_path):
              full = os.path.join(bin_path, f)
              if os.path.isfile(full):
                  with open(full, 'rb') as fh:
                      magic = fh.read(4)
                      if magic == b'\xcf\xfa\xed\xfe':
                          bin_name = f
                          break
          
          full_path = os.path.join(bin_path, bin_name)
          
          # 读取文件
          with open(full_path, 'rb') as f:
              data = bytearray(f.read())
          
          # 找 __TEXT 段信息（用于 VM 地址转文件偏移）
          text_vmaddr = 0
          text_fileoff = 0
          
          magic, cputype, cpusubtype, filetype, ncmds, sizeofcmds, flags, reserved = struct.unpack_from('<IIIIIIII', data, 0)
          offset = 32
          for i in range(ncmds):
              cmd, cmdsize = struct.unpack_from('<II', data, offset)
              if cmd == 0x19:
                  segname, vmaddr, vmsize, fileoff, filesize, maxprot, initprot, nsects, flags = struct.unpack_from('<16sQQQQIIII', data, offset + 8)
                  segname = segname.decode('utf-8', errors='replace').rstrip('\x00')
                  if segname == '__TEXT':
                      text_vmaddr = vmaddr
                      text_fileoff = fileoff
              offset += cmdsize
          
          def vm_to_file(vm_addr):
              return int(vm_addr - text_vmaddr + text_fileoff)
          
          # 解析 otool 输出
          with open('/tmp/objc_methods.txt', 'r') as f:
              content = f.read()
          
          # 找 ViewController 类
          vc_match = re.search(r'class name: ViewController.*?instance methods:(.*?)(?=\n\s*\n|\Z)', content, re.DOTALL)
          if not vc_match:
              print("❌ 找不到 ViewController 类")
              exit(1)
          
          vc_methods = vc_match.group(1)
          
          # 提取方法名和 imp 地址
          methods = {}
          method_pattern = r'name:\s+(\S+).*?imp:\s+0x([0-9a-fA-F]+)'
          for match in re.finditer(method_pattern, vc_methods, re.DOTALL):
              name = match.group(1)
              imp = int(match.group(2), 16)
              methods[name] = imp
              print(f"  方法: {name} @ {hex(imp)}")
          
          # 找我们需要的方法
          needed = ['onVerify', 'tryAutoLogin:', 'doHeartbeat', 'enterMainConsole']
          addrs = {}
          for name in needed:
              if name in methods:
                  addrs[name] = methods[name]
                  print(f"\n✅ 找到 {name}: {hex(addrs[name])}")
              else:
                  print(f"\n❌ 找不到 {name}")
          
          if len(addrs) < 3:
              print("❌ 关键方法缺失，无法继续")
              exit(1)
          
          # ============================================
          # Patch 方法实现
          # ============================================
          
          # 1. onVerify → 直接跳转到 enterMainConsole
          if 'onVerify' in addrs and 'enterMainConsole' in addrs:
              onverify_file = vm_to_file(addrs['onVerify'])
              enter_file = addrs['enterMainConsole']
              
              # 计算 b 指令的偏移
              # ARM64 b 指令: 0x14000000 | (imm26 & 0x03FFFFFF)
              # 偏移 = (目标 - 当前) >> 2
              offset_bytes = (addrs['enterMainConsole'] - addrs['onVerify']) >> 2
              if offset_bytes < 0:
                  offset_bytes += (1 << 26)
              
              b_instr = 0x14000000 | (offset_bytes & 0x03FFFFFF)
              struct.pack_into('<I', data, onverify_file, b_instr)
              print(f"✅ onVerify 已 patch 为跳转到 enterMainConsole")
          
          # 2. tryAutoLogin: → 直接跳转到 enterMainConsole
          if 'tryAutoLogin:' in addrs and 'enterMainConsole' in addrs:
              tryauto_file = vm_to_file(addrs['tryAutoLogin:'])
              
              offset_bytes = (addrs['enterMainConsole'] - addrs['tryAutoLogin:']) >> 2
              if offset_bytes < 0:
                  offset_bytes += (1 << 26)
              
              b_instr = 0x14000000 | (offset_bytes & 0x03FFFFFF)
              struct.pack_into('<I', data, tryauto_file, b_instr)
              print(f"✅ tryAutoLogin: 已 patch 为跳转到 enterMainConsole")
          
          # 3. doHeartbeat → 直接返回
          if 'doHeartbeat' in addrs:
              doheartbeat_file = vm_to_file(addrs['doHeartbeat'])
              struct.pack_into('<I', data, doheartbeat_file, 0xD65F03C0)  # ret
              print(f"✅ doHeartbeat 已 patch 为空实现")
          
          # 写回文件
          with open(full_path, 'wb') as f:
              f.write(data)
          
          print("\n✅ 验证逻辑 Patch 完成！")
          PYEOF2
          
          # 重新签名
          ldid -S "$FULL_BIN"
          echo "✅ 重新签名完成"
          
          # 重新打包
          cd temp && zip -qr ../IBOX_已绕过验证.ipa Payload && cd ..
          ls -lh IBOX_已绕过验证.ipa
          echo "✅ 最终 IPA 打包完成"

      - name: 上传最终 IPA
        uses: actions/upload-artifact@v4
        with:
          name: IBOX_已绕过验证.ipa
          path: IBOX_已绕过验证.ipa
